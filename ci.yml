name: CI

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: todo_db
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: poetry install

      - name: Run Alembic Migration
        run: poetry run alembic upgrade head
        env:
          DATABASE_URL: mysql+mysqlconnector://user:password@127.0.0.1:3306/todo_db

      - name: Run Tests
        run: poetry run pytest
        env:
          DATABASE_URL: mysql+mysqlconnector://user:password@127.0.0.1:3306/todo_db

      - name: Docker Build
        run: docker build -t todo-api .